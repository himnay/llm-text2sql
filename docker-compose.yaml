services:
  oracle:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: text2sql-oracle
    shm_size: '2gb'
    environment:
      ORACLE_PWD: ${ORACLE_SYS_PASSWORD:-text2sql}
      APP_USER: ${ORACLE_USERNAME:-text2sql}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-text2sql}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s # Valid YAML comment format

volumes:
  oracle-data:
  ollama-data:
